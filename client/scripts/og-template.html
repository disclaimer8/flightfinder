<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(56,189,248,0.22), transparent 55%),
      radial-gradient(ellipse at 85% 75%, rgba(168,85,247,0.25), transparent 55%),
      linear-gradient(135deg, #0b1226 0%, #0c1427 45%, #0a1a33 100%);
    color: #fff;
    position: relative;
    padding: 72px 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse at 50% 60%, #000 40%, transparent 75%);
  }
  .brand {
    display: flex; align-items: center; gap: 16px;
    font-size: 28px; font-weight: 600; letter-spacing: 0.3px;
    position: relative; z-index: 2;
  }
  .brand .icon {
    width: 52px; height: 52px; border-radius: 14px;
    background: linear-gradient(135deg, #38bdf8, #a855f7);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; box-shadow: 0 8px 32px rgba(56,189,248,0.35);
  }
  .main { position: relative; z-index: 2; }
  h1 {
    font-size: 88px; font-weight: 800; line-height: 1.02;
    letter-spacing: -2px;
    background: linear-gradient(120deg, #fff 0%, #c7d2fe 60%, #a5f3fc 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 20px;
  }
  h1 em { font-style: normal;
    background: linear-gradient(120deg, #38bdf8, #a855f7);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  p.subtitle {
    font-size: 30px; color: #94a3b8; font-weight: 400;
    max-width: 900px; line-height: 1.35;
  }
  .tags {
    display: flex; gap: 14px; flex-wrap: wrap;
    position: relative; z-index: 2;
  }
  .tag {
    padding: 12px 22px; border-radius: 999px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    font-size: 20px; color: #e2e8f0;
    backdrop-filter: blur(10px);
  }
  .url {
    position: absolute; bottom: 40px; right: 80px;
    font-size: 22px; color: #64748b;
    letter-spacing: 0.5px; z-index: 2;
  }
</style>
</head>
<body>
  <div class="grid"></div>

  <div class="brand">
    <div class="icon">✈</div>
    <div>FlightFinder</div>
  </div>

  <div class="main">
    <h1>Search flights by<br><em>aircraft type</em></h1>
    <p class="subtitle">
      Find routes operated by Boeing 737, Airbus A320,<br>
      turboprops and wide-body jets worldwide.
    </p>
  </div>

  <div class="tags">
    <div class="tag">Boeing 737</div>
    <div class="tag">Airbus A320</div>
    <div class="tag">A350 / 787</div>
    <div class="tag">Turboprops</div>
    <div class="tag">Regional jets</div>
  </div>

  <div class="url">himaxym.com</div>
</body>
</html>
