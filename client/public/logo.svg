<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="86" y1="21" x2="426" y2="491" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B8BFF"/>
      <stop offset="100%" stop-color="#0A42B5"/>
    </linearGradient>
  </defs>

  <!-- Фоновый круг -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>

  <!-- Внутреннее кольцо — тонкий световой контур -->
  <circle cx="256" cy="256" r="222" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="6"/>

  <!--
    Самолёт «лёгкий» — вид сверху, вся геометрия в системе 200×200,
    центрированной в нуле, затем масштабируется и поворачивается.

    Трансформ: translate(256,256) rotate(35) scale(2.0) translate(-100,-99)
  -->
  <g transform="translate(256,256) rotate(35) scale(2.0) translate(-100,-99)" fill="white">

    <!-- Фюзеляж -->
    <ellipse cx="100" cy="99" rx="9" ry="88"/>

    <!-- Левое крыло -->
    <path d="M91 76 C80 80, 42 94, 10 114
             C7 118, 8 123, 12 124
             C17 122, 42 106, 91 100 Z"/>

    <!-- Правое крыло -->
    <path d="M109 76 C120 80, 158 94, 190 114
             C193 118, 192 123, 188 124
             C183 122, 158 106, 109 100 Z"/>

    <!-- Левое хвостовое оперение -->
    <path d="M91 160
             C78 165, 60 175, 58 181
             C57 184, 60 186, 63 185
             C68 183, 80 177, 91 170 Z"/>

    <!-- Правое хвостовое оперение -->
    <path d="M109 160
             C122 165, 140 175, 142 181
             C143 184, 140 186, 137 185
             C132 183, 120 177, 109 170 Z"/>

  </g>
</svg>
