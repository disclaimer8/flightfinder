<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#1a1a2e"/>
  <!-- Airplane silhouette -->
  <g fill="#ffffff" transform="translate(50,50) rotate(-45) translate(-50,-50)">
    <!-- Fuselage -->
    <rect x="46" y="25" width="8" height="50" rx="4"/>
    <!-- Main wings -->
    <polygon points="50,45 15,65 50,60 85,65"/>
    <!-- Tail wings -->
    <polygon points="50,68 32,78 50,75 68,78"/>
  </g>
</svg>
