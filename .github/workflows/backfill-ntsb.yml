name: NTSB Narrative Backfill

# Manual one-time job. Downloads NTSB avall.zip (~94 MB), runs mdb-export against
# its tables, and ingests narratives for every sidecar accident with a matching
# carol.ntsb.gov/event/* source URL. Expected runtime ~30 minutes.
#
# Trigger via:  gh workflow run backfill-ntsb.yml
# Or:           https://github.com/disclaimer8/flightfinder/actions/workflows/backfill-ntsb.yml
#
# This reuses the same SSH path as deploy.yml (appleboy/ssh-action +
# secrets.claude key). No persistent infrastructure changes.

on:
  workflow_dispatch:

concurrency:
  group: ntsb-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Trigger backfill on prod
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: 178.104.32.46
          username: root
          key: ${{ secrets.claude }}
          # Default command_timeout is 10m — override since backfill itself is
          # ~30m. Add headroom for network slowdowns on the 94 MB download.
          command_timeout: 45m
          script: |
            set -euo pipefail
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            export PATH="$PATH:/usr/local/bin"
            cd ~/flightfinder
            echo "=== preflight ==="
            command -v mdb-export >/dev/null 2>&1 || apt-get install -y mdbtools
            command -v unzip      >/dev/null 2>&1 || apt-get install -y unzip
            command -v sqlite3    >/dev/null 2>&1 || apt-get install -y sqlite3
            test -f /root/flightfinder/data/accidents.db \
              || { echo "sidecar accidents.db missing — deploy not complete"; exit 1; }
            echo "=== running backfill ==="
            time npm run backfill-ntsb 2>&1 | tail -200
            echo "=== post-backfill stats ==="
            # Inline stats query — token-gated /api/admin endpoint isn't useful here
            # since we're already on the box with the SQLite file in front of us.
            sqlite3 /root/flightfinder/server/data/app.db <<'SQL'
              SELECT 'total' AS k, COUNT(*) AS v FROM accident_narratives
              UNION ALL
              SELECT 'indexable', SUM(indexable) FROM accident_narratives
              UNION ALL
              SELECT 'q90_100', SUM(CASE WHEN quality_score BETWEEN 90 AND 100 THEN 1 ELSE 0 END) FROM accident_narratives
              UNION ALL
              SELECT 'q50_89',  SUM(CASE WHEN quality_score BETWEEN 50 AND 89  THEN 1 ELSE 0 END) FROM accident_narratives
              UNION ALL
              SELECT 'q0_49',   SUM(CASE WHEN quality_score BETWEEN 0  AND 49  THEN 1 ELSE 0 END) FROM accident_narratives;
            SQL
