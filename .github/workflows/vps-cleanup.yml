name: VPS one-shot cleanup

# Targeted cleanup of bulky orphan junk discovered by vps-disk-audit:
#   - /var/lib/apport/coredump/core.*  (OOM-killed Node dumps, ~9.5GB)
#   - /var/tmp/ntsb-*  (stale NTSB worker tmpdirs, ~6.2GB)
#
# Defensive: skips ntsb-tmpdir nuke if mdb-export or a ntsbDumpWorker
# process is currently running (only deletes tmpdirs modified >10 min ago
# in that case).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: 178.104.32.46
          username: root
          key: ${{ secrets.claude }}
          script: |
            set +e
            echo "=== df -h before ==="
            df -h /
            echo ""
            echo "=== coredump removal ==="
            ls -la /var/lib/apport/coredump 2>/dev/null
            CORE_BYTES=$(du -sb /var/lib/apport/coredump 2>/dev/null | awk '{print $1}')
            rm -f /var/lib/apport/coredump/core.* 2>/dev/null
            echo "[cleanup] removed coredumps: $((CORE_BYTES / 1024 / 1024)) MB"
            # Disable future coredump capture from apport — useful in dev,
            # actively harmful in prod where Node OOMs leave 2-3GB dumps.
            systemctl stop apport.service 2>/dev/null
            systemctl disable apport.service 2>/dev/null
            echo "ProcessSizeLimit=0" > /etc/systemd/coredump.conf.d/disable.conf 2>/dev/null
            mkdir -p /etc/systemd/coredump.conf.d/ 2>/dev/null && \
              printf "[Coredump]\nStorage=none\nProcessSizeLimit=0\n" > /etc/systemd/coredump.conf.d/disable.conf
            systemctl daemon-reload 2>/dev/null
            echo "[cleanup] apport disabled, systemd coredump storage=none"
            echo ""
            echo "=== ntsb tmpdir removal ==="
            if pgrep -af 'ntsbDumpWorker|backfill-ntsb|mdb-export' >/dev/null 2>&1; then
              echo "[cleanup] NTSB worker active — using -mmin +10 filter"
              pgrep -af 'ntsbDumpWorker|backfill-ntsb|mdb-export'
              find /var/tmp -maxdepth 1 -name 'ntsb-*' -mmin +10 -exec rm -rf {} + 2>/dev/null
            else
              echo "[cleanup] no NTSB worker — full nuke"
              NTSB_BYTES=$(du -sb /var/tmp/ntsb-* 2>/dev/null | awk '{s+=$1} END {print s}')
              rm -rf /var/tmp/ntsb-* 2>/dev/null
              echo "[cleanup] removed ntsb-tmpdirs: $((${NTSB_BYTES:-0} / 1024 / 1024)) MB"
            fi
            echo ""
            echo "=== df -h after ==="
            df -h /
            echo ""
            echo "=== still-large files >50M after cleanup ==="
            find / -xdev -type f -size +50M -printf '%s\t%p\n' 2>/dev/null | sort -rn | head -10 | awk '{ printf "%.0fM\t%s\n", $1/1024/1024, $2 }'
