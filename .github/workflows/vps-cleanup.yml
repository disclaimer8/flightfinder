name: VPS one-shot cleanup

# Targeted cleanup of bulky orphan junk discovered by vps-disk-audit:
#   - /var/lib/apport/coredump/core.*  (OOM-killed Node dumps, ~9.5GB)
#   - /var/tmp/ntsb-*  (stale NTSB worker tmpdirs, ~6.2GB)
#
# Defensive: skips ntsb-tmpdir nuke if a real ntsb worker process is
# running (matches `node ... ntsbDumpWorker` specifically — earlier
# version used `pgrep -f mdb-export` which false-matched the cleanup
# shell itself).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: origin.himaxym.com
          username: root
          key: ${{ secrets.claude }}
          script: |
            set +e
            echo "=== df -h before ==="
            df -h /
            echo ""
            echo "=== coredump removal ==="
            CORE_BYTES=$(du -sb /var/lib/apport/coredump 2>/dev/null | awk '{print $1}')
            rm -f /var/lib/apport/coredump/core.* 2>/dev/null
            echo "[cleanup] removed coredumps: $((${CORE_BYTES:-0} / 1024 / 1024)) MB"
            systemctl stop apport.service 2>/dev/null
            systemctl disable apport.service 2>/dev/null
            mkdir -p /etc/systemd/coredump.conf.d/
            printf "[Coredump]\nStorage=none\nProcessSizeLimit=0\n" > /etc/systemd/coredump.conf.d/disable.conf
            systemctl daemon-reload 2>/dev/null
            echo "[cleanup] apport disabled, systemd coredump storage=none"
            echo ""
            echo "=== ntsb worker detection (exact match) ==="
            # Match the node process by argv (not by shell text). Exclude pid $$
            # belt-and-braces against this very shell.
            ACTIVE=$(ps -eo pid,args | grep -v "^ *$$" | grep -E 'node[^ ]*(ntsbDumpWorker|backfill-ntsb\.js)' | grep -v grep)
            if [ -n "$ACTIVE" ]; then
              echo "[cleanup] NTSB worker active — preserving recent tmpdirs"
              echo "$ACTIVE"
              find /var/tmp -maxdepth 1 -name 'ntsb-*' -mmin +10 -exec rm -rf {} + 2>/dev/null
            else
              echo "[cleanup] no NTSB worker — full nuke"
              NTSB_BYTES=$(du -sb /var/tmp/ntsb-* 2>/dev/null | awk '{s+=$1} END {print s}')
              rm -rf /var/tmp/ntsb-* 2>/dev/null
              echo "[cleanup] removed ntsb-tmpdirs: $((${NTSB_BYTES:-0} / 1024 / 1024)) MB"
            fi
            echo ""
            echo "=== df -h after ==="
            df -h /
            echo ""
            echo "=== pm2 list ==="
            pm2 list 2>/dev/null
            echo ""
            echo "=== recent pm2 logs from any worker (last 30 lines, errors) ==="
            pm2 logs --nostream --lines 30 --err 2>/dev/null | tail -50
