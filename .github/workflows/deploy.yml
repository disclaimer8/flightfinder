name: Deploy to Production

on:
  push:
    branches: [main]

permissions:
  contents: read
env:
  OPENSKY_USERNAME: ${{ secrets.OPENSKY_USERNAME }}
  OPENSKY_PASSWORD: ${{ secrets.OPENSKY_PASSWORD }}
  AIRLABS_API_KEY: ${{ secrets.AIRLABS_API_KEY }}
  TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
  TRAVELPAYOUTS_MARKER: ${{ secrets.TRAVELPAYOUTS_MARKER }}
  TRAVELPAYOUTS_TRS: ${{ secrets.TRAVELPAYOUTS_TRS }}
  RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
  STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
  STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
  STRIPE_PRICE_MONTHLY: ${{ secrets.STRIPE_PRICE_MONTHLY }}
  STRIPE_PRICE_ANNUAL: ${{ secrets.STRIPE_PRICE_ANNUAL }}
  STRIPE_PRICE_LIFETIME: ${{ secrets.STRIPE_PRICE_LIFETIME }}
  STRIPE_LIVE: ${{ secrets.STRIPE_LIVE }}
  PUBLIC_WEB_ORIGIN: ${{ secrets.PUBLIC_WEB_ORIGIN }}
  ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
  INGEST_ENABLED: ${{ secrets.INGEST_ENABLED }}
  INGEST_TOP_ROUTES: ${{ secrets.INGEST_TOP_ROUTES }}
  FLEET_BOOTSTRAP: ${{ secrets.FLEET_BOOTSTRAP }}
  OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
  VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
  VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
  VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
  TRIPS_ENABLED: ${{ secrets.TRIPS_ENABLED }}
  ENRICHED_CARD: ${{ secrets.ENRICHED_CARD }}
  ALERT_THRESHOLD_MIN: ${{ secrets.ALERT_THRESHOLD_MIN }}
  OURAIRPORTS_REFRESH: ${{ secrets.OURAIRPORTS_REFRESH }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: 178.104.32.46
          username: root
          key: ${{ secrets.claude }}
          envs: OPENSKY_USERNAME,OPENSKY_PASSWORD,AIRLABS_API_KEY,TRAVELPAYOUTS_TOKEN,TRAVELPAYOUTS_MARKER,TRAVELPAYOUTS_TRS,RAPIDAPI_KEY,SENTRY_DSN,VITE_SENTRY_DSN,STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET,STRIPE_PRICE_MONTHLY,STRIPE_PRICE_ANNUAL,STRIPE_PRICE_LIFETIME,STRIPE_LIVE,PUBLIC_WEB_ORIGIN,ADMIN_TOKEN,INGEST_ENABLED,INGEST_TOP_ROUTES,FLEET_BOOTSTRAP,OPENWEATHER_API_KEY,VAPID_PUBLIC_KEY,VAPID_PRIVATE_KEY,VAPID_SUBJECT,TRIPS_ENABLED,ENRICHED_CARD,ALERT_THRESHOLD_MIN,OURAIRPORTS_REFRESH
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            export PATH="$PATH:/usr/local/bin"
            cd ~/flightfinder
            git pull origin main
            # Write OpenSky credentials to server .env (idempotent)
            sed -i '/^OPENSKY_/d' server/.env
            echo "OPENSKY_USERNAME=${OPENSKY_USERNAME}" >> server/.env
            echo "OPENSKY_PASSWORD=${OPENSKY_PASSWORD}" >> server/.env
            # Write AirLabs API key to server .env (idempotent)
            sed -i '/^AIRLABS_/d' server/.env
            echo "AIRLABS_API_KEY=${AIRLABS_API_KEY}" >> server/.env
            # Write Travelpayouts credentials to server .env (idempotent)
            sed -i '/^TRAVELPAYOUTS_/d' server/.env
            echo "TRAVELPAYOUTS_TOKEN=${TRAVELPAYOUTS_TOKEN}" >> server/.env
            echo "TRAVELPAYOUTS_MARKER=${TRAVELPAYOUTS_MARKER}" >> server/.env
            echo "TRAVELPAYOUTS_TRS=${TRAVELPAYOUTS_TRS}" >> server/.env
            # Enable adsb.lol write-through worker (free, ODbL)
            sed -i '/^ADSBLOL_/d' server/.env
            echo "ADSBLOL_ENABLED=1" >> server/.env
            # Write AeroDataBox/RapidAPI key (idempotent)
            sed -i '/^RAPIDAPI_KEY/d' server/.env
            echo "RAPIDAPI_KEY=${RAPIDAPI_KEY}" >> server/.env
            # Sentry server DSN (idempotent)
            sed -i '/^SENTRY_DSN/d' server/.env
            echo "SENTRY_DSN=${SENTRY_DSN}" >> server/.env
            # Write Stripe credentials (idempotent)
            sed -i '/^STRIPE_/d' server/.env
            echo "STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}" >> server/.env
            echo "STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}" >> server/.env
            echo "STRIPE_PRICE_MONTHLY=${STRIPE_PRICE_MONTHLY}" >> server/.env
            echo "STRIPE_PRICE_ANNUAL=${STRIPE_PRICE_ANNUAL}" >> server/.env
            echo "STRIPE_PRICE_LIFETIME=${STRIPE_PRICE_LIFETIME}" >> server/.env
            echo "STRIPE_LIVE=${STRIPE_LIVE}" >> server/.env
            # Public origin for Stripe Checkout return URLs
            sed -i '/^PUBLIC_WEB_ORIGIN/d' server/.env
            echo "PUBLIC_WEB_ORIGIN=${PUBLIC_WEB_ORIGIN}" >> server/.env
            # Admin utility token for /api/auth/admin/verify-email (idempotent)
            sed -i '/^ADMIN_TOKEN/d' server/.env
            echo "ADMIN_TOKEN=${ADMIN_TOKEN}" >> server/.env
            # Data-ingestion toggles + OpenWeather key (Plan 2)
            sed -i '/^INGEST_ENABLED/d' server/.env
            sed -i '/^INGEST_TOP_ROUTES/d' server/.env
            sed -i '/^FLEET_BOOTSTRAP/d' server/.env
            sed -i '/^OPENWEATHER_API_KEY/d' server/.env
            echo "INGEST_ENABLED=${INGEST_ENABLED:-0}" >> server/.env
            echo "INGEST_TOP_ROUTES=${INGEST_TOP_ROUTES:-30}" >> server/.env
            echo "FLEET_BOOTSTRAP=${FLEET_BOOTSTRAP:-0}" >> server/.env
            echo "OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}" >> server/.env
            # VAPID + trips kill-switches (Plan 4)
            sed -i '/^VAPID_PUBLIC_KEY/d' server/.env
            sed -i '/^VAPID_PRIVATE_KEY/d' server/.env
            sed -i '/^VAPID_SUBJECT/d' server/.env
            sed -i '/^TRIPS_ENABLED/d' server/.env
            sed -i '/^ENRICHED_CARD/d' server/.env
            sed -i '/^ALERT_THRESHOLD_MIN/d' server/.env
            echo "VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}" >> server/.env
            echo "VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}" >> server/.env
            echo "VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:admin@himaxym.com}" >> server/.env
            echo "TRIPS_ENABLED=${TRIPS_ENABLED:-1}" >> server/.env
            echo "ENRICHED_CARD=${ENRICHED_CARD:-1}" >> server/.env
            echo "ALERT_THRESHOLD_MIN=${ALERT_THRESHOLD_MIN:-30}" >> server/.env
            # OurAirports refresh toggle (Plan 6)
            sed -i '/^OURAIRPORTS_REFRESH/d' server/.env
            echo "OURAIRPORTS_REFRESH=${OURAIRPORTS_REFRESH:-0}" >> server/.env
            cd server && npm install --omit=dev
            # pngquant is needed by client/scripts/optimize-images.mjs (postbuild
            # hook). Install idempotently; apt-get is fast when already present.
            command -v pngquant >/dev/null 2>&1 || apt-get install -y pngquant
            # VITE_SENTRY_DSN is a build-time env — export into client build so
            # Vite bakes it into the bundle. Client code reads import.meta.env.
            cd ../client && npm install && VITE_SENTRY_DSN="${VITE_SENTRY_DSN}" npm run build
            cp /root/flightfinder/nginx/himaxym.conf /etc/nginx/sites-enabled/flightfinder
            # Ensure brotli nginx modules are installed. Ubuntu auto-enables them
            # from /etc/nginx/modules-enabled/ after install. If the packages
            # aren't available on this Ubuntu release, sed-strip the brotli
            # directives from the site file so `nginx -t` still passes (gzip
            # remains as fallback).
            if ! dpkg -l libnginx-mod-http-brotli-filter 2>/dev/null | grep -q '^ii'; then
              apt-get update -qq
              if ! apt-get install -y libnginx-mod-http-brotli-filter libnginx-mod-http-brotli-static; then
                echo "[deploy] brotli modules unavailable — stripping brotli directives"
                sed -i '/^\s*brotli/d' /etc/nginx/sites-enabled/flightfinder
              fi
            fi
            nginx -t && systemctl reload nginx
            pm2 restart flightfinder --update-env
            pm2 save
