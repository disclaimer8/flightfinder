name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 178.104.32.46
          username: root
          key: ${{ secrets.claude }}
          script: |
            cd ~/flightfinder
            git pull origin main
            cd server && npm install --omit=dev
            cd ../client && npm install && npm run build
            cp /root/flightfinder/nginx/himaxym.conf /etc/nginx/sites-available/default
            nginx -t && systemctl reload nginx
            pm2 restart flightfinder --update-env
            pm2 save
