server {
    listen 80;
    server_name himaxym.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name himaxym.com;

    ssl_certificate /etc/letsencrypt/live/himaxym.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/himaxym.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # gzip — react-vendor chunk compresses ~68% (284KB → ~90KB). Enabled for
    # text-ish types only; PNG/JPG/WebP are already compressed. gzip_proxied
    # matters because static assets come back through nginx as proxied
    # responses from the Express server.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/rss+xml
        application/atom+xml
        application/ld+json
        application/manifest+json
        image/svg+xml
        font/ttf
        font/otf;

    # SSE endpoint — disable buffering so events stream immediately
    location /api/flights/aircraft-search/stream {
        proxy_pass http://localhost:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        chunked_transfer_encoding on;
    }

    location / {
        proxy_pass http://localhost:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
