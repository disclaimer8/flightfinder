server {
    listen 80;
    server_name himaxym.com;
    return 301 https://$host$request_uri;
}

server {
    # http2 — multiplexes asset requests over one TCP+TLS connection.
    # nginx is built --with-http_v2_module on this VPS but the directive
    # was missing, so the server was negotiating http/1.1 over ALPN. This
    # alone removes head-of-line blocking on the 5+ asset chunks the SPA
    # loads in parallel. Syntax: `listen 443 ssl http2;` works on all
    # nginx >= 1.9.5 (the newer `http2 on;` form requires 1.25.1+).
    #
    # HTTP/3 (QUIC) terminates at the Cloudflare edge, not here — see
    # docs/cloudflare-setup.md for the proxy setup. Origin nginx stays on
    # HTTPS/2 + TCP; CF talks h3 to the browser and h2 to us.
    listen 443 ssl http2;
    server_name himaxym.com;

    # Cloudflare real-IP rewriting. With CF in proxy mode, every request
    # arrives from a CF edge IP. Without realip rewriting, our rate-limiter,
    # Sentry, and access logs all see the same handful of CF IPs — meaning
    # a single noisy user gets their fair share, but everyone else from the
    # same edge gets rate-limited too, and our error attribution collapses.
    # deploy.yml refreshes /etc/nginx/conf.d/cloudflare-ips.conf from
    # cloudflare.com/ips on every release so the CIDR list stays current.
    # The file always exists (deploy.yml writes an empty stub when CF isn't
    # configured) so this include can't fail nginx -t.
    include /etc/nginx/conf.d/cloudflare-ips.conf;

    ssl_certificate /etc/letsencrypt/live/himaxym.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/himaxym.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # HSTS preload-eligible header. The two-year max-age + preload flag is
    # what hstspreload.org requires; submit himaxym.com there once after
    # deploy to get baked into Chromium/Firefox/Safari preload lists.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ─────────────────────────────────────────────────────────────────────
    # Legacy URL redirects (search redesign 2026-05-07).
    # Match on $request_uri so the regex anchors `^/\?` confine the redirect
    # to the home URL only — using $arg_mode would re-match after redirect
    # (e.g. /by-aircraft?mode=by-aircraft preserves the arg and re-fires
    # the rule, causing a 301 loop, which we hit on first deploy and now
    # explicitly defend against).
    #
    # Family-specific resolution (/?mode=by-aircraft&family=787 →
    # /aircraft/boeing-787) is deferred to LegacyRedirect.jsx; nginx just
    # gets the user off the legacy URL onto the right index page.
    # ─────────────────────────────────────────────────────────────────────
    if ($request_uri ~ "^/\?(.*&)?mode=by-aircraft(&|$)") {
        return 301 /by-aircraft$is_args$args;
    }
    if ($request_uri ~ "^/\?(.*&)?mode=map(&|$)") {
        return 301 /map;
    }

    # Brotli — ~15-20% smaller than gzip at comparable CPU. Falls through to
    # gzip when the client doesn't send Accept-Encoding: br (older bots,
    # some corporate proxies). Both are on so every client gets the best
    # available encoding. Modules come from Ubuntu packages libnginx-mod-
    # http-brotli-filter/static — deploy.yml installs them; if unavailable
    # on this OS, deploy.yml sed-strips brotli directives as a fallback.
    #
    # brotli_static on — when a client requests /assets/foo.js with
    # Accept-Encoding: br, nginx looks for /assets/foo.js.br on disk and
    # serves it directly (zero CPU per request). Vite's compression plugin
    # generates these *.br/*.gz alongside the originals at build time at
    # max quality (11) — far better than the dynamic level-5 fallback.
    brotli on;
    brotli_comp_level 5;
    brotli_static on;
    brotli_min_length 256;
    brotli_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/rss+xml
        application/atom+xml
        application/ld+json
        application/manifest+json
        image/svg+xml
        font/ttf
        font/otf;

    # gzip — dynamic fallback for the ~4% of clients without brotli support.
    # Vite only pre-compresses to *.br (brotli, level 11); gzip is generated
    # on the fly per request at level 6 — adequate for the long tail.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/rss+xml
        application/atom+xml
        application/ld+json
        application/manifest+json
        image/svg+xml
        font/ttf
        font/otf;

    # Serve immutable Vite build assets straight from disk — bypassing
    # Express saves one Node hop (~30-80ms TTFB on cold connections) and
    # lets brotli_static pick up the pre-compressed *.br files that
    # vite-plugin-compression emits at build time at level 11. deploy.yml
    # rsyncs dist/assets/ → /var/www/flightfinder/assets/ on every release
    # so this directory mirrors whatever Express would otherwise serve
    # from /root/flightfinder/client/dist/assets/. Filenames carry content
    # hashes so 1y immutable cache is safe.
    location /assets/ {
        alias /var/www/flightfinder/assets/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Vary "Accept-Encoding" always;
        try_files $uri =404;
    }

    # Aviation safety global dataset — read-only Go sidecar on :5003.
    # Strip our public prefix so the sidecar sees its native root-mounted
    # routes (/accidents, /stats/*, /map_data, /health). Trailing slash on
    # both `location` and `proxy_pass` is significant: nginx replaces the
    # location prefix with the proxy_pass URI prefix.
    location /api/safety/global/ {
        proxy_pass http://127.0.0.1:5003/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # SSE endpoint — disable buffering so events stream immediately
    location /api/flights/aircraft-search/stream {
        proxy_pass http://localhost:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        chunked_transfer_encoding on;
    }

    # SSR cache for high-traffic Googlebot + organic landing pages (2026-05-19).
    # Bypass when an auth cookie is present (logged-in users see fresh content).
    # Override upstream Cache-Control/Vary/Set-Cookie: Node sets defensive
    # no-cache via helmet, but the SSR HTML is identical across UA's (only
    # robots meta differs which we keep, and that's by URL not UA). We want
    # the proxy_cache_valid TTL to govern, not upstream's no-cache.
    location ~ ^/(routes|aircraft|airline|accidents|safety/events|safety/global|by-aircraft|alliance|country|flights-from|flights-to)(/|$) {
        proxy_cache ssr_cache;
        proxy_cache_key "$scheme$proxy_host$request_uri";
        proxy_cache_valid 200 1h;
        proxy_cache_valid 404 5m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_revalidate on;
        proxy_ignore_headers Cache-Control Set-Cookie Vary Expires;
        proxy_hide_header Set-Cookie;
        proxy_no_cache    $cookie_session$cookie_auth_token;
        proxy_cache_bypass $cookie_session$cookie_auth_token;
        add_header X-Cache-Status $upstream_cache_status always;

        proxy_pass http://localhost:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://localhost:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
