server {
    listen 80;
    server_name himaxym.com;
    return 301 https://$host$request_uri;
}

server {
    # http2 — multiplexes asset requests over one TCP+TLS connection.
    # nginx is built --with-http_v2_module on this VPS but the directive
    # was missing, so the server was negotiating http/1.1 over ALPN. This
    # alone removes head-of-line blocking on the 5+ asset chunks the SPA
    # loads in parallel. Syntax: `listen 443 ssl http2;` works on all
    # nginx >= 1.9.5 (the newer `http2 on;` form requires 1.25.1+).
    listen 443 ssl http2;
    server_name himaxym.com;

    ssl_certificate /etc/letsencrypt/live/himaxym.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/himaxym.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Brotli — ~15-20% smaller than gzip at comparable CPU. Falls through to
    # gzip when the client doesn't send Accept-Encoding: br (older bots,
    # some corporate proxies). Both are on so every client gets the best
    # available encoding. Modules come from Ubuntu packages libnginx-mod-
    # http-brotli-filter/static — deploy.yml installs them; if unavailable
    # on this OS, deploy.yml sed-strips brotli directives as a fallback.
    brotli on;
    brotli_comp_level 5;
    brotli_static off;
    brotli_min_length 256;
    brotli_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/rss+xml
        application/atom+xml
        application/ld+json
        application/manifest+json
        image/svg+xml
        font/ttf
        font/otf;

    # gzip — fallback for clients without brotli support (rare but exists).
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/rss+xml
        application/atom+xml
        application/ld+json
        application/manifest+json
        image/svg+xml
        font/ttf
        font/otf;

    # SSE endpoint — disable buffering so events stream immediately
    location /api/flights/aircraft-search/stream {
        proxy_pass http://localhost:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        chunked_transfer_encoding on;
    }

    location / {
        proxy_pass http://localhost:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
